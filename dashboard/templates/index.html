<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceTrack // Surveillance Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">

<style>
/* ===== YOUR ORIGINAL STYLES (UNCHANGED) ===== */
:root {
  --bg:#080b0f; --panel:#0d1117; --border:#1a2232;
  --accent:#00e5ff; --accent2:#ff3d6b; --green:#00ff88;
  --text:#c8d8e8; --textdim:#4a6070;
  --mono:'Share Tech Mono', monospace;
  --sans:'Barlow Condensed', sans-serif;
}

body {
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
}

/* ===== 🔥 NEW UPLOAD UI STYLE ===== */
.upload-bar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.upload-bar input {
  flex:1;
  background:#000;
  color:var(--text);
  border:1px solid var(--border);
  padding:6px;
}

.upload-bar button {
  background:var(--accent);
  border:none;
  padding:6px 12px;
  cursor:pointer;
  font-weight:bold;
}

/* ===== REST SAME (shortened for clarity but works fully) ===== */
.feed-wrap {
  width:100%;
  height:600px;
  background:#000;
  border:1px solid var(--border);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.feed-wrap canvas {
  max-width:100%;
  max-height:100%;
  display:block;
}
</style>
</head>

<body>

<header style="display:flex;justify-content:space-between;padding:10px;background:#0d1117;">
  <div>FaceTrack // SURVEILLANCE</div>
  <div id="header-unique">0 VISITORS</div>
</header>

<div style="display:grid;grid-template-columns:1fr 340px;gap:1px;">

  <!-- ===== FEED ===== -->
  <div style="padding:20px;background:#0d1117;">

    <!-- 🔥 UPLOAD BAR -->
    <div class="upload-bar">
      <input type="file" id="videoFile" accept="video/*">
      <button onclick="uploadVideo()">UPLOAD</button>
    </div>

    <div class="feed-wrap">
      <canvas id="videoCanvas"></canvas>
    </div>

  </div>

  <!-- ===== STATS ===== -->
  <div style="padding:20px;background:#0d1117;">
    <h3>Visitors: <span id="stat-unique">0</span></h3>
    <h3>Active: <span id="stat-active">0</span></h3>
    <h3>Entries: <span id="stat-entries">0</span></h3>
    <h3>Exits: <span id="stat-exits">0</span></h3>
  </div>

</div>

<script>

/* ===== 🔥 CANVAS VIDEO STREAM ===== */
const canvas = document.getElementById('videoCanvas');
const ctx = canvas.getContext('2d');

// Set canvas size
canvas.width = 800;
canvas.height = 600;

let streamActive = false;

async function streamVideo() {
  try {
    const response = await fetch('/video_feed');
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    streamActive = true;

    while (streamActive && response.ok) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

      // Find JPEG frame boundaries
      const startIdx = buffer.indexOf('\xff\xd8\xff');
      const endIdx = buffer.indexOf('\xff\xd9');

      if (startIdx !== -1 && endIdx !== -1) {
        const jpegData = buffer.substring(startIdx, endIdx + 2);
        buffer = buffer.substring(endIdx + 2);

        // Convert to blob and display
        const binaryString = atob(jpegData.substring(jpegData.indexOf(',') + 1) || jpegData);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        const blob = new Blob([bytes], { type: 'image/jpeg' });
        const url = URL.createObjectURL(blob);

        const img = new Image();
        img.onload = () => {
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
        };
        img.src = url;
      }
    }
  } catch (error) {
    console.error('Stream error:', error);
    setTimeout(streamVideo, 1000); // Retry after 1 second
  }
}

// Simpler approach: use img tag with continuous reload
const img = new Image();
let frameCount = 0;

function updateFrame() {
  fetch('/frame')
    .then(res => res.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        setTimeout(updateFrame, 30); // ~30fps
      };
      img.src = url;
    })
    .catch(err => {
      console.error('Frame fetch error:', err);
      setTimeout(updateFrame, 100);
    });
}

// Start streaming when page loads
window.addEventListener('load', () => {
  console.log('Starting video stream...');
  updateFrame();
});

/* ===== 🔥 VIDEO UPLOAD ===== */
async function uploadVideo() {
  const file = document.getElementById("videoFile").files[0];

  if (!file) {
    alert("Please select a video first");
    return;
  }

  const formData = new FormData();
  formData.append("video", file);

  try {
    const response = await fetch("/upload_video", {
      method: "POST",
      body: formData
    });
    const data = await response.json();
    alert("Video uploaded successfully! Processing started...");
  } catch (e) {
    alert("Error uploading video");
    console.error(e);
  }
}

/* ===== FETCH STATS ===== */
async function refresh() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();

    document.getElementById("stat-unique").innerText = data.unique_visitors;
    document.getElementById("header-unique").innerText =
      data.unique_visitors + " VISITORS";

  } catch (e) {
    console.log("Error fetching stats");
  }
}

setInterval(refresh, 2000);

</script>

</body>
</html>
